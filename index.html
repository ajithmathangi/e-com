<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Web Application</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        header{
            background:#0077ff;
            color:white;
            padding:20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .products{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
            padding:30px;
        }

        .product-card{
            background:white;
            border-radius:10px;
            padding:15px;
            text-align:center;
            box-shadow:0 4px 8px rgba(0,0,0,0.1);
        }

        .product-card img{
            width:100%;
            height:220px;
            object-fit:cover;
            border-radius:10px;
        }

        .product-card h2{
            margin:10px 0;
        }

        .product-card p{
            color:green;
            font-size:20px;
            margin-bottom:10px;
        }

        button{
            background:#0077ff;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056cc;
        }

        .cart-section{
            background:white;
            margin:20px;
            padding:20px;
            border-radius:10px;
        }

        #cart-items li{
            margin:10px 0;
            font-size:18px;
        }

    </style>
</head>

<body>

    <header>
        <h1>My E-Commerce Store</h1>

        <div>
            🛒 Cart:
            <span id="cart-count">0</span>
        </div>
    </header>

    <section class="products">

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=800">

            <h2>Sports Shoes</h2>

            <p>₹1999</p>

            <button onclick="addToCart('Sports Shoes')">
                Add to Cart
            </button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=800">

            <h2>Smart Watch</h2>

            <p>₹2999</p>

            <button onclick="addToCart('Smart Watch')">
                Add to Cart
            </button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=800">

            <h2>Mobile Phone</h2>

            <p>₹14999</p>

            <button onclick="addToCart('Mobile Phone')">
                Add to Cart
            </button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=800">

            <h2>Headphones</h2>

            <p>₹999</p>

            <button onclick="addToCart('Headphones')">
                Add to Cart
            </button>
        </div>

    </section>

    <section class="cart-section">

        <h2>Cart Items</h2>

        <ul id="cart-items"></ul>

    </section>

    <script>

        let cartCount = 0;

        function addToCart(productName){

            cartCount++;

            document.getElementById("cart-count").innerText = cartCount;

            const cartItems = document.getElementById("cart-items");

            const li = document.createElement("li");

            li.innerText = productName + " added to cart";

            cartItems.appendChild(li);
        }

    </script>

</body>
</html>
